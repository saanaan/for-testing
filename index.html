<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: black;
    overflow: hidden;
}

.container {
    width: 100vw;
    height: 100vh;

    display: flex;
    justify-content: center;
    align-items: center;
}

iframe {
    width: min(100vw, calc(100vh * 1.3333));
    height: min(100vh, calc(100vw / 1.3333));

    border: none;
}
</style>
</head>

<body>

<div class="container">
    <iframe
        src="https://archive.org/embed/the-binding-of-isaac_202111"
        allowfullscreen>
    </iframe>
</div>

</body>
</html>
