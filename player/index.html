<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <title>Game Player</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="loading-spinner" class="loading-spinner">
        <div class="spinner"></div>
        <p>Loading game...</p>
    </div>

    <div id="error-container" class="error-container hidden">
        <div class="error-content">
            <h2>⚠️ Missing Game URL</h2>
            <p>Please provide a game URL using the <code>?url=</code> parameter.</p>
            <div class="example">
                <p><strong>Example:</strong></p>
                <code>?url=https://archive.org/embed/the-binding-of-isaac_202111</code>
            </div>
            <p class="hint">Or visit your <a href="/">Games Library</a> to select a game.</p>
        </div>
    </div>

    <div id="game-container" class="game-container hidden">
        <button id="fullscreen-btn" class="fullscreen-btn" title="Fullscreen" aria-label="Toggle fullscreen">
            <svg viewBox="0 0 24 24" width="24" height="24">
                <path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z" fill="currentColor"/>
            </svg>
        </button>
        <div id="iframe-wrapper" class="iframe-wrapper">
            <iframe id="game-iframe" allowfullscreen allow="fullscreen; accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"></iframe>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
